<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Imobiliária</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a3c5e 0%, #2e86c1 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            border: none;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-header {
            background: linear-gradient(135deg, #1a3c5e, #2e86c1);
            color: white;
            border-radius: 16px 16px 0 0;
            padding: 32px 24px 24px;
            text-align: center;
        }
        .login-header h4 { font-weight: 700; margin: 0; }
        .login-header p { opacity: 0.8; font-size: 0.85rem; margin: 4px 0 0; }
        .login-body { padding: 28px 28px 24px; }
        .form-label { font-weight: 500; color: #1a3c5e; }
        .form-control:focus {
            border-color: #2e86c1;
            box-shadow: 0 0 0 0.2rem rgba(46,134,193,0.25);
        }
        .btn-login {
            background: linear-gradient(135deg, #1a3c5e, #2e86c1);
            border: none;
            padding: 10px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }
        .btn-login:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="login-card card">
        <div class="login-header">
            <i class="bi bi-house-door-fill fs-1 mb-2 d-block"></i>
            <h4>Imobiliária</h4>
            <p>Sistema de Gestão</p>
        </div>
        <div class="login-body">
            {% if form.errors %}
                <div class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    Usuário ou senha inválidos. Tente novamente.
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ next }}">

                <div class="mb-3">
                    <label for="id_username" class="form-label">
                        <i class="bi bi-person me-1"></i>Usuário
                    </label>
                    <input
                        type="text"
                        id="id_username"
                        name="username"
                        class="form-control"
                        placeholder="Digite seu usuário"
                        autofocus
                        required
                    >
                </div>

                <div class="mb-4">
                    <label for="id_password" class="form-label">
                        <i class="bi bi-lock me-1"></i>Senha
                    </label>
                    <input
                        type="password"
                        id="id_password"
                        name="password"
                        class="form-control"
                        placeholder="Digite sua senha"
                        required
                    >
                </div>

                <button type="submit" class="btn btn-login btn-primary text-white w-100 rounded-pill">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
                </button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
