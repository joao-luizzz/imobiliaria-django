<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página não encontrada — Imobiliária</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a3c5e 0%, #2e86c1 100%);
            font-family: 'Segoe UI', sans-serif;
        }
        .error-card {
            background: white;
            border-radius: 20px;
            padding: 48px 40px;
            text-align: center;
            max-width: 480px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .error-code {
            font-size: 6rem;
            font-weight: 900;
            color: #1a3c5e;
            line-height: 1;
            letter-spacing: -4px;
        }
        .error-icon {
            font-size: 3rem;
            color: #2e86c1;
            margin: 12px 0;
        }
        .error-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: #1a3c5e;
            margin-bottom: 8px;
        }
        .error-desc {
            color: #64748b;
            font-size: 0.95rem;
            margin-bottom: 28px;
        }
        .btn-home {
            background: linear-gradient(135deg, #1a3c5e, #2e86c1);
            border: none;
            color: white;
            padding: 10px 28px;
            border-radius: 50px;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
        }
        .btn-home:hover { opacity: 0.9; color: white; }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-code">404</div>
        <div class="error-icon"><i class="bi bi-search"></i></div>
        <div class="error-title">Página não encontrada</div>
        <p class="error-desc">
            A página que você está procurando não existe ou foi movida.
            {% if request_path %}
                <br><code class="text-muted small">{{ request_path }}</code>
            {% endif %}
        </p>
        <a href="/" class="btn-home">
            <i class="bi bi-house-fill me-2"></i>Voltar ao início
        </a>
    </div>
</body>
</html>
